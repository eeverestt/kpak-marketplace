name: build KPak Index

on:
  push:
    paths:
      - "packages/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
            python-version: "3.1.1"

      - name: Generate index.json
        run: |
          python scripts/generate_index.py

      - name: Commit updated index.json
        run: |
          git config user.name "kpak-bot"
          git config user.email "kpak-bot@users.noreply.github.com"

          git add index.json

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "chore: update kpak index"
          git push
